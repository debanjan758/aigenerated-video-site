name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Install backend dependencies
        working-directory: ./frontend/backend
        run: npm ci

      - name: Lint and type check (TypeScript)
        working-directory: ./frontend/backend
        run: npm run check || true

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/backend
          file: ./backend/Dockerfile
          push: false
          tags: aigenerated-video-site-backend:latest

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: aigenerated-video-site-frontend:latest

  docker-compose-test:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Docker services
        run: docker-compose up -d --build

      - name: Wait for backend to be healthy
        run: |
          for i in {1..30}; do
            if docker-compose exec -T backend wget --quiet --tries=1 --spider http://localhost:3001/api/health; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "Backend failed to become healthy"
          docker-compose logs backend
          exit 1

      - name: Test backend health endpoint
        run: curl -f http://localhost:3001/api/health || exit 1

      - name: Stop services
        if: always()
        run: docker-compose down
