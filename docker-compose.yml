version: '3.8'

services:
  backend:
    build:
      context: ./frontend/backend
      dockerfile: ../../backend/Dockerfile
    container_name: video-site-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend/backend/uploads:/app/uploads
      - ./frontend/backend/outputs:/app/outputs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: video-site-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://localhost:3001

volumes:
  uploads:
  outputs:
